<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Crazy Bugs – Quick Match</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

/* ── TAP TO START ── */
#tap-screen {
  position: fixed; inset: 0;
  z-index: 9999999;
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: opacity 0.4s ease;
}
#tap-screen.hide {
  opacity: 0;
  pointer-events: none;
}
#tap-text {
  font-family: Arial, sans-serif;
  font-size: clamp(12px, 1.4vw, 16px);
  color: rgba(255,255,255,0.7);
  letter-spacing: 2px;
  text-transform: lowercase;
  animation: tap-pulse 2s ease-in-out infinite;
}
@keyframes tap-pulse {
  0%, 100% { opacity: 0.5; }
  50%       { opacity: 1; }
}


#intro-screen {
  position: fixed; inset: 0;
  z-index: 2147483647;
  background: #d4d0c8 url('assets/background/loadingbg.png') center center / cover no-repeat;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Arial', sans-serif;
  overflow: hidden;
}

/* Logo area */
#intro-logo {
  display: flex;
  align-items: center;
  gap: 0;
  user-select: none;
}
#intro-mascot {
  font-size: clamp(60px, 8vw, 90px);
  line-height: 1;
  filter: drop-shadow(0 4px 8px rgba(0,0,0,0.15));
}
#intro-title {
  font-size: clamp(52px, 8vw, 96px);
  font-weight: 700;
  color: #3a3a3a;
  letter-spacing: -2px;
  line-height: 1;
  font-family: 'Arial', 'Helvetica Neue', sans-serif;
}

/* Corner texts */
.intro-corner {
  position: absolute;
  font-family: 'Arial', sans-serif;
  color: #666;
  line-height: 1.4;
}
#intro-top-left {
  top: 20px; left: 24px;
  font-size: clamp(9px, 1vw, 12px);
}
#intro-top-left .intro-version {
  font-weight: 600;
  color: #444;
}
#intro-top-left .intro-server {
  color: #888;
  font-size: 0.9em;
}
#intro-top-right {
  top: 16px; right: 20px;
  font-size: 20px;
  color: #888;
}
#intro-bottom-left {
  bottom: 20px; left: 24px;
  display: flex;
  align-items: center;
  gap: 10px;
}
#intro-loading-text {
  font-size: clamp(11px, 1.2vw, 14px);
  font-weight: 600;
  color: #444;
  letter-spacing: 0.5px;
}
#intro-bottom-right {
  bottom: 20px; right: 24px;
  font-size: clamp(9px, 1vw, 12px);
  color: #888;
}
@keyframes intro-spin {
  to { transform: rotate(360deg); }
}
#intro-spinner {
  width: 20px; height: 20px;
  border: 2.5px solid #ccc;
  border-top-color: #555;
  border-radius: 50%;
  animation: intro-spin 0.8s linear infinite;
  flex-shrink: 0;
}



:root {
  --sat: env(safe-area-inset-top, 0px);
  --sab: env(safe-area-inset-bottom, 0px);
  --sal: env(safe-area-inset-left, 0px);
  --sar: env(safe-area-inset-right, 0px);
}

html, body {
  width: 100%; height: 100%;
  background: black;
  overflow: hidden;
  font-family: sans-serif;
  padding: 0; margin: 0;
  max-height: 100vh;
}

/* ── VIRTUAL POINTER ── */
* { cursor: none !important; }
#virtual-pointer {
  position: fixed;
  top: 0; left: 0;
  width: 14px; height: 14px;
  background: url('assets/virtual/pointer.png') no-repeat top left / contain;
  z-index: 999999;
  pointer-events: none;
  user-select: none;
  -webkit-user-select: none;
  will-change: transform;
  transform: translate(0px, 0px);
  filter: drop-shadow(0 1px 2px rgba(0,0,0,0.6));
}
@keyframes pill-pop {
  0%   { transform: scale(0.82); opacity: 0; }
  55%  { transform: scale(1.04); opacity: 1; }
  100% { transform: scale(1);    opacity: 1; }
}
@keyframes pill-fade-out {
  0%   { opacity: 1; transform: scale(1); }
  100% { opacity: 0; transform: scale(0.88); }
}
@keyframes menu-slide-in {
  0%   { transform: translateX(-8px); opacity: 0.4; }
  100% { transform: translateX(0);    opacity: 1; }
}

/* ── LAYER SLIDE SYSTEM ── */
#lobby-layers {
  position: absolute; inset: 0;
  overflow: hidden;
  z-index: 3;
}

.layer-slide {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  will-change: transform;
  transform: translateX(100%) translateZ(0); /* semua mulai di luar kanan */
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
}
/* Layer 2 tampil di tengah secara default sebelum JS jalan */
#slide-2 {
  transform: translateX(0) translateZ(0);
}
.layer-slide .lobby-layer {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover; object-position: center;
}
.layer-slide .layer-content {
  position: absolute; inset: 0;
  z-index: 6;
  font-family: 'Fredoka', sans-serif;
  pointer-events: none;
}
.layer-slide.active .layer-content {
  pointer-events: all;
}

/* ── LAYER 1 CONTENT: Custom Game Panel ── */
#layer1-content {
  position: absolute; inset: 0;
  display: flex;
  align-items: center;
  justify-content: flex-end;
  padding-right: 6%;
  padding-bottom: 48px;
  padding-top: 8px;
  font-family: 'Fredoka', sans-serif;
}

#layer1-panel {
  position: relative;
  width: clamp(300px, 46vw, 580px);
  height: calc(100vh - 80px);
  max-height: 600px;
  background: #F8E0A4;
  border-radius: 24px;
  box-shadow: 0 6px 0 #b8860b, 0 12px 40px rgba(0,0,0,0.28);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transform: perspective(900px) rotateY(-8deg);
  transform-origin: right center;
}

/* ── LAYER 2 CONTENT ── */
#layer2-content > * { pointer-events: all; }

/* ── MAIN MENU SCREEN ── */
#screen-menu {
  position: fixed; inset: 0;
  opacity: 1; pointer-events: all;
  z-index: 1;
  background: #1a1a2e;
}

#lobby-bg {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover; object-position: center;
}

#menu-content {
  position: absolute; inset: 0;
  z-index: 10;
  font-family: 'Fredoka', sans-serif;
  pointer-events: none;
}

/* ── LOBBY LAYOUT ── */
.lobby-left {
  position: absolute;
  left: 6%;
  top: 50%;
  transform: translateY(-50%) perspective(400px) rotateY(22deg);
  transform-origin: left center;
  display: flex;
  flex-direction: column;
  gap: 4px;
  z-index: 5;
}

#lobby-menu {
  display: flex;
  flex-direction: column;
  gap: 4px;
  padding: 18px 24px 18px 20px;
}

.lobby-menu-item {
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  position: relative;
  min-height: 1.2em;
}
.lobby-menu-item:active { transform: scale(0.94); }

/* ── Semua label: ukuran tetap konsisten ── */
.lobby-menu-item .menu-label {
  font-size: clamp(14px, 1.8vw, 22px);
  font-weight: 700;
  color: #fff8e7;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  text-shadow: none;
  white-space: nowrap;
  display: block;
  transition: opacity 0.15s ease;
}
.lobby-menu-item.main .menu-label {
  font-size: clamp(22px, 3.2vw, 40px);
  font-weight: 700;
}
.lobby-menu-item.sub .menu-label {
  font-size: clamp(14px, 1.8vw, 22px);
  font-weight: 700;
  color: rgba(255,248,231,0.8);
}
.lobby-menu-item.was-active > .menu-label { color: #ffe08a; }

/* Saat aktif: label opacity 0 tapi tetap ambil ruang → tidak ada layout shift */
.lobby-menu-item.active > .menu-label { opacity: 0; }

/* ── Pill: in-flow, ukuran font SAMA dengan label ── */
.lobby-menu-item .menu-pill { display: none; }
.lobby-menu-item.active .menu-pill {
  display: flex;
  align-items: center;
  gap: 8px;
  background: #FDF2D6;
  border: none;
  border-radius: 999px;
  padding: 6px 24px 6px 14px;
  box-shadow: none;
  white-space: nowrap;
  /* Overlay persis di posisi label yang sama */
  position: absolute;
  left: 0;
  top: 0;
  height: 100%;
  animation: pill-pop 0.38s cubic-bezier(0.22, 1, 0.36, 1) forwards;
}
.lobby-menu-item.active .menu-arrow {
  width: 0; height: 0;
  border-top: 8px solid transparent;
  border-bottom: 8px solid transparent;
  border-left: 13px solid #c47a00;
  flex-shrink: 0;
}
/* Font pill SAMA PERSIS dengan label */
.lobby-menu-item.active .menu-pill .menu-label {
  opacity: 1;
  color: #3a2000;
  text-shadow: none;
  animation: menu-slide-in 0.32s cubic-bezier(0.22, 1, 0.36, 1) forwards;
}

/* Separator */
.menu-separator { display: block; height: 14px; }

/* ── CUSTOM GAME MODAL ── */
#customgame-modal {
  position: fixed; inset: 0;
  z-index: 100;
  display: none;
  align-items: center;
  justify-content: flex-end;
  padding-right: 10%;
  padding-bottom: 2%;
}
#customgame-modal.open { display: flex; }

#customgame-panel {
  position: relative;
  width: clamp(280px, 42vw, 560px);
  height: 72vh;
  max-height: 460px;
  background: #FDF2D6;
  border-radius: 20px;
  box-shadow: 0 6px 0 #b8860b, 0 12px 36px rgba(0,0,0,0.3);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transform: perspective(800px) rotateY(-8deg);
  transform-origin: right center;
  animation: cg-slide-in 0.38s cubic-bezier(0.34,1.2,0.64,1) forwards;
}
#customgame-modal.closing #customgame-panel {
  animation: cg-slide-out 0.28s cubic-bezier(0.4,0,0.2,1) forwards;
}
@keyframes cg-slide-in {
  0%   { transform: perspective(800px) rotateY(-8deg) translateX(60px); opacity: 0; }
  100% { transform: perspective(800px) rotateY(-8deg) translateX(0);    opacity: 1; }
}
@keyframes cg-slide-out {
  0%   { transform: perspective(800px) rotateY(-8deg) translateX(0);    opacity: 1; }
  100% { transform: perspective(800px) rotateY(-8deg) translateX(60px); opacity: 0; }
}

/* Header */
#cg-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px 16px;
  flex-shrink: 0;
  background: #FCD35F;
  border-radius: 24px 24px 0 0;
}
#cg-title {
  font-family: 'Fredoka', sans-serif;
  font-size: clamp(22px, 3.2vw, 38px);
  font-weight: 700;
  color: #ffffff;
  text-transform: uppercase;
  letter-spacing: 1px;
  line-height: 1.05;
}
#cg-header-btns {
  display: flex;
  gap: 10px;
  align-items: center;
}
.cg-header-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 9px 18px;
  border-radius: 999px;
  font-family: 'Fredoka', sans-serif;
  font-size: clamp(11px, 1.2vw, 14px);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  cursor: pointer;
  transition: transform 0.18s cubic-bezier(0.34,1.56,0.64,1);
  -webkit-tap-highlight-color: transparent;
  white-space: nowrap;
}
.cg-header-btn:active { transform: scale(0.92) translateY(2px); }
#btn-create {
  background: #FCE970;
  border: 2.5px solid #e8d040;
  color: #5a4000;
  box-shadow: 0 3px 0 #c8a800;
}
#btn-quickjoin {
  background: #B8F85C;
  border: 2.5px solid #8ecc3a;
  color: #2a4800;
  box-shadow: 0 3px 0 #6aaa18;
}

/* Tab bar di bawah Custom Game title */
#cg-tabs {
  display: flex;
  gap: 6px;
  padding: 0 20px 12px;
  flex-shrink: 0;
}
.cg-tab {
  background: #FBEECE;
  border: none;
  border-radius: 999px;
  padding: 4px 12px;
  font-family: 'Fredoka', sans-serif;
  font-size: clamp(9px, 1vw, 11px);
  font-weight: 700;
  color: #5a3a00;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  cursor: pointer;
  transition: transform 0.15s ease, filter 0.15s ease;
}
.cg-tab.active {
  filter: brightness(0.88);
  box-shadow: inset 0 2px 4px rgba(0,0,0,0.15);
}
.cg-tab:active { transform: scale(0.93); }

/* Toolbar */
#cg-toolbar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0 20px 10px;
  flex-shrink: 0;
}
.cg-tool-btn {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 6px 14px;
  border-radius: 999px;
  background: #FBEECE;
  border: 2px solid #f0e080;
  font-family: 'Fredoka', sans-serif;
  font-size: clamp(10px, 1.1vw, 13px);
  font-weight: 600;
  color: #5a4800;
  text-transform: uppercase;
  cursor: pointer;
  transition: transform 0.15s ease;
}
.cg-tool-btn .tool-icon {
  color: #8499D2;
  font-size: 14px;
  line-height: 1;
  flex-shrink: 0;
}
.cg-tool-btn:active { transform: scale(0.93); }
#btn-refresh {
  width: 34px; height: 34px;
  padding: 0;
  justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
  border-radius: 50%;
}

/* Column headers — dengan separator garis vertikal */
#cg-col-header {
  display: flex;
  align-items: center;
  padding: 6px 20px 6px;
  flex-shrink: 0;
  border-bottom: 1.5px solid rgba(180,130,0,0.2);
}
.cg-col-name  { flex: 1; }
.cg-col-mode  { width: 90px; text-align: center; border-left: 1.5px solid rgba(180,130,0,0.25); padding-left: 8px; }
.cg-col-status{ width: 100px; text-align: center; border-left: 1.5px solid rgba(180,130,0,0.25); padding-left: 8px; }
.cg-col-ping  { width: 50px; text-align: center; border-left: 1.5px solid rgba(180,130,0,0.25); padding-left: 8px; }
.cg-col-header span {
  font-family: 'Fredoka', sans-serif;
  font-size: clamp(11px, 1.1vw, 13px);
  font-weight: 600;
  color: #a07830;
  text-transform: uppercase;
  letter-spacing: 0.8px;
}

/* List */
#cg-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px 14px 14px;
  scrollbar-width: thin;
  scrollbar-color: rgba(180,130,0,0.3) transparent;
}
#cg-list::-webkit-scrollbar { width: 4px; }
#cg-list::-webkit-scrollbar-thumb { background: rgba(180,130,0,0.3); border-radius: 4px; }

/* Room row */
.cg-room {
  display: flex;
  align-items: center;
  background: #FBEECE;
  border: 2px solid #e8c060;
  border-radius: 10px;
  padding: 5px 10px 5px 6px;
  margin-bottom: 5px;
  cursor: pointer;
  transition: transform 0.18s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.18s ease;
  box-shadow: 0 2px 0 #c89820;
}
.cg-room:active { transform: scale(0.98) translateY(1px); box-shadow: 0 1px 0 #c89820; }
.cg-room-thumb {
  width: 32px; height: 32px;
  border-radius: 7px;
  background: #FCD35F;
  flex-shrink: 0;
  margin-right: 8px;
  overflow: hidden;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px;
}
.cg-room-thumb img { width: 100%; height: 100%; object-fit: cover; border-radius: 10px; }
.cg-room-name {
  flex: 1;
  font-family: 'Fredoka', sans-serif;
  font-size: clamp(10px, 1.2vw, 13px);
  font-weight: 600;
  color: #3a2800;
}
.cg-room-mode {
  width: 80px;
  text-align: center;
  font-family: 'Fredoka', sans-serif;
  font-size: clamp(9px, 1vw, 11px);
  color: #7a5820;
  font-weight: 500;
  border-left: 1.5px solid rgba(180,130,0,0.15);
  padding-left: 6px;
}
.cg-room-status {
  width: 90px;
  text-align: center;
  font-family: 'Fredoka', sans-serif;
  font-size: clamp(9px, 1vw, 11px);
  font-weight: 600;
  color: #5a3800;
  border-left: 1.5px solid rgba(180,130,0,0.15);
  padding-left: 6px;
}
.cg-room-ping {
  width: 40px;
  text-align: center;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  gap: 2px;
  border-left: 1.5px solid rgba(180,130,0,0.15);
  padding-left: 6px;
}
.ping-bar {
  width: 3px;
  border-radius: 2px;
  background: #4caf50;
}

/* Back button — kiri tengah layar, kotak rounded */
#cg-back {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%) translateY(100%);
  height: 38px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
  font-family: 'Fredoka', sans-serif;
  z-index: 200;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.22s ease, transform 0.28s cubic-bezier(0.34,1.4,0.64,1);
  padding: 0 20px;
  cursor: pointer;
  background: none;
  border: none;
  box-shadow: none;
}
#cg-back.visible {
  opacity: 1;
  pointer-events: all;
  transform: translateX(-50%) translateY(0);
}
#cg-back:active { opacity: 0.5; }
#cg-back-arrow { font-size: 12px; color: #5a3800; line-height: 1; }
#cg-back-label { font-size: clamp(11px, 1.3vw, 13px); font-weight: 700; color: #5a3800; text-transform: uppercase; letter-spacing: 1px; line-height: 1; }


.lobby-center {
  position: absolute;
  left: 50%;
  bottom: 60px;
  transform: translateX(-50%);
  width: clamp(280px, 38vw, 520px);
  pointer-events: none;
}
.lobby-center img {
  width: 100%;
  height: auto;
  object-fit: contain;
  filter: drop-shadow(0 20px 30px rgba(0,0,0,0.3));
}

/* ── RIGHT CARDS ── */
.lobby-right {
  position: absolute;
  right: 6%;
  top: 50%;
  transform: translateY(-50%);
  transform-origin: right center;
  display: flex;
  flex-direction: column;
  gap: 10px;
  perspective: 400px;
}

.lobby-card {
  width: clamp(200px, 26vw, 320px);
  aspect-ratio: 16/10;
  border-radius: 16px;
  overflow: hidden;
  cursor: pointer;
  position: relative;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  transition: transform 0.22s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.22s ease;
  -webkit-tap-highlight-color: transparent;
  transform: rotateY(-22deg);
  transform-origin: right center;
}
.lobby-card:active { transform: scale(0.96); }
.lobby-card-strip {
  display: flex;
  width: 300%;
  height: 100%;
  transition: transform 0.5s cubic-bezier(0.4,0,0.2,1);
}
.lobby-card-strip img {
  width: calc(100% / 3);
  height: 100%;
  object-fit: cover;
  display: block;
  flex-shrink: 0;
}
.lobby-card-dots {
  position: absolute;
  bottom: 7px; left: 0; right: 0;
  display: flex; justify-content: center; gap: 4px;
}
.lobby-card-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.45); }
.lobby-card-dot.active { background: white; }

/* ── HOVER POP EFFECT ── semua elemen bertabel ── */
.bar-btn,
.bar-currency,
.bar-more,
.bar-profile,
.bar-icon-btn,
.bar-squad,
.lobby-card,
.lobby-menu-item.active .menu-pill,
.cg-header-btn,
.cg-tool-btn,
.cg-room {
  transition: transform 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
}

/* Pop in saat pointer hover - JS akan tambah class .hovered */
.bar-btn.hovered          { transform: scale(1.08); }
.bar-currency.hovered     { transform: scale(1.08); }
.bar-more.hovered         { transform: scale(1.1); }
.bar-profile.hovered      { transform: scale(1.06); }
.bar-icon-btn.hovered     { transform: scale(1.1); }
.bar-squad.hovered        { transform: scale(1.08); }
.lobby-card.hovered       { transform: rotateY(-22deg) scale(1.05); }
.cg-header-btn.hovered    { transform: scale(1.06); }
.cg-tool-btn.hovered      { transform: scale(1.06); }
.cg-room.hovered          { transform: scale(1.02); }
.lobby-bottom {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  pointer-events: all;
  height: 38px;
  background: #F0D470;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border-top: 1.5px solid rgba(255,255,255,0.28);
  display: flex;
  align-items: center;
  padding: 0 10px;
  gap: 6px;
}
.bar-left { display: flex; align-items: center; gap: 6px; flex: 1; }
.bar-btn {
  display: flex; align-items: center; gap: 4px;
  background: #FDF2D6;
